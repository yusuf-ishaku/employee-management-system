<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Log In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Abyssinica+SIL&family=Balsamiq+Sans&family=Dancing+Script:wght@600&family=Jost&family=Lora&family=Montserrat:wght@200&family=Noto+Serif:ital,wght@1,700&family=Pacifico&family=Playfair+Display&family=Poppins&family=Roboto:wght@300;400&family=Source+Code+Pro&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-blue-500">
    <div class="flex flex-row sm:w-4/5 w-11/12 m-auto pt-20 h-4/5">
        <div class="form-initiate flex flex-col items-center w-full h-fit bg-white rounded-xl p-4  lg:pb-16 lg:pt-10 sm:-mb-4">
            <p class="form-header text-xl md:text-3xl text-gray-600 block p-2">Welcome back!</p>
            <form class="py-3">
                <input type="email" placeholder="Email" id="fname" name="fname" class="email p-1 text-xl mx-auto block border-me focus:outline-none border-gray-300 rounded-md sm:w-96 w-full" required><br>
                <!-- <label for="fname">First name:</label><br> -->
                <input type="text" placeholder="Username" id="fname" name="fname" class="username  mx-auto block p-1 text-xl border-me focus:outline-none border-gray-300 rounded-md sm:w-96 w-full" required><br>
                <!-- <label for="lname">Last name:</label><br> -->
                <input type="password" placeholder="**************" id="lname" name="lname" class="password mb-2 sm:mb-3  block mx-auto focus:outline-none p-1 border-me text-xl border-gray-300 rounded-md sm:w-96 w-full" required>

                <button type="submit" value="Submit" class="login block border-me mx-auto sm:w-96 w-full text-xl p-1 bg-blue-500 text-white rounded-md">Submit</button>
            </form>
            <button  value="Account" class="signup block border-me sm:w-96 w-full text-md sm:text-xl mt-1 p-1 bg-white border-blue-500 hover:bg-blue-500 hover:text-white text-blue-500 rounded-md">Create New Account</button>
        </div>
    </div>
</body>
</html>
