<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Log In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-iYQeCzEYFbKjA/T2uDLTpkwGzCiq6soy8tYaI1GyVh/UjpbCx/TYkiZhlZB6+fzT" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Abyssinica+SIL&family=Balsamiq+Sans&family=Dancing+Script:wght@600&family=Jost&family=Lora&family=Montserrat:wght@200&family=Noto+Serif:ital,wght@1,700&family=Pacifico&family=Playfair+Display&family=Poppins&family=Roboto:wght@300;400&family=Source+Code+Pro&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-blue-500">
    <div class="flex flex-row w-4/5 m-auto pt-20 h-4/5">
        <div class="form-initiate flex flex-col items-center w-full bg-white rounded-xl p-4">
            <p class="form-header text-xl md:text-3xl text-gray-600 block p-2">Welcome back!</p>
            <p class="enter text-md md:text-xl text-gray-600">Log In</p> 
            <form class="py-3">
                <input type="email" placeholder="Email" id="fname" name="fname" class="my-2 p-1 text-xl border-me focus:outline-none border-gray-300 rounded-md w-96" required><br>
                <!-- <label for="fname">First name:</label><br> -->
                <input type="text" placeholder="Username" id="fname" name="fname" class="my-2 p-1 text-xl border-me focus:outline-none border-gray-300 rounded-md w-96" required><br>
                <!-- <label for="lname">Last name:</label><br> -->
                <input type="password" placeholder="**************" id="lname" name="lname" class="my-3 focus:outline-none p-1 border-me text-xl border-gray-300 rounded-md w-96" required>

                <button type="submit" value="Submit" class="block border-me w-96 text-xl p-1 bg-blue-300 text-white rounded-md">Submit</button>
            </form>
        </div>
    </div>
</body>
</html>
